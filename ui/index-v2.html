<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PodBlendz</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.5;
    }

    input {
      width: 100%;
      max-width: 420px;
      padding: 10px;
      font-size: 1rem;
      margin-top: 16px;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
    }

    #status {
      margin-top: 12px;
      font-style: italic;
    }

    audio {
      margin-top: 20px;
      width: 100%;
    }

    pre {
      background: #f4f4f4;
      padding: 12px;
      margin-top: 20px;
      font-size: 0.9rem;
      overflow-x: auto;
    }
  </style>
</head>

<body>

  <!-- Product copy (from PRODUCT.md) -->
  <h1>PodBlendz</h1>

  <p>
    PodBlendz blends multiple podcasts into a single audio story
    on the topic you choose.
  </p>

  <p>
    Search by topic, and PodBlendz finds relevant podcasts,
    combines perspectives, and turns them into one listenable blend.
  </p>

  <!-- Search -->
  <input
    id="queryInput"
    type="text"
    placeholder="What do you want to listen to?"
  />

  <br />

  <button onclick="createBlend()">Create Blend</button>

  <div id="status"></div>

  <!-- Audio -->
  <audio id="audioPlayer" controls></audio>

  <!-- Debug output (optional, remove later) -->
  <pre id="debug"></pre>

<script>
  const BACKEND_BASE = "https://podblendz-backend.onrender.com";

  async function createBlend() {
    const query = document.getElementById("queryInput").value.trim();
    const status = document.getElementById("status");
    const audio = document.getElementById("audioPlayer");
    const debug = document.getElementById("debug");

    status.textContent = "";
    audio.src = "";
    debug.textContent = "";

    if (!query) {
      status.textContent = "Please enter a topic.";
      return;
    }

    status.textContent = "Creating blend…";

    try {
      const response = await fetch(`${BACKEND_BASE}/blend/`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ query })
      });

      if (!response.ok) {
        const text = await response.text();
        status.textContent = "Error creating blend.";
        debug.textContent = text;
        return;
      }

      const data = await response.json();

      debug.textContent = JSON.stringify(data, null, 2);

      if (data.audio_path) {
        audio.src = BACKEND_BASE + data.audio_path;
        await audio.play();
        status.textContent = "Blend ready.";
      } else {
        status.textContent = "Blend created, but no audio returned.";
      }

    } catch (err) {
      status.textContent = "Network error.";
      debug.textContent = String(err);
    }
  }
</script>

</body>
</html>
