<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PodBlendz</title>

    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 40px;
        max-width: 720px;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.5;
      }

      input {
        width: 100%;
        max-width: 400px;
        padding: 10px;
        font-size: 1rem;
        margin-top: 15px;
      }

      button {
        margin-top: 10px;
        padding: 10px 16px;
        font-size: 1rem;
        cursor: pointer;
      }

      pre {
        background: #f5f5f5;
        padding: 12px;
        margin-top: 20px;
        overflow-x: auto;
        font-size: 0.9rem;
      }

      audio {
        display: block;
        margin-top: 20px;
        width: 100%;
      }

      #status {
        margin-top: 10px;
        font-style: italic;
      }
    </style>
  </head>

  <body>
    <!-- Product identity -->
    <h1>PodBlendz</h1>

    <p>
      PodBlendz blends multiple podcasts into a single audio story on the topic
      you choose.
    </p>

    <p>
      Search by topic, and PodBlendz finds relevant podcasts, combines
      perspectives, and turns them into one listenable blend.
    </p>

    <!-- Search input -->
    <input
      id="searchInput"
      type="text"
      placeholder="What do you want to listen to?"
    />

    <br />

    <button onclick="createBlend()">Create Blend</button>

    <div id="status"></div>

    <!-- Result details (debug-friendly, optional) -->
    <pre id="result"></pre>

    <!-- Audio player -->
    <audio id="player" controls></audio>

    <script>
      async function createBlend() {
        const query = document.getElementById("searchInput").value.trim();
        const status = document.getElementById("status");
        const result = document.getElementById("result");
        const player = document.getElementById("player");

        result.textContent = "";
        player.src = "";
        status.textContent = "";

        if (!query) {
          status.textContent = "Please enter a topic.";
          return;
        }

        status.textContent = "Creating blend…";

        try {
          const response = await fetch(
            "https://podblendz-backend.onrender.com/blend",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ query }),
            }
          );

          if (!response.ok) {
            status.textContent = "Blend failed.";
            const errorText = await response.text();
            result.textContent = errorText;
            return;
          }

          const data = await response.json();

          status.textContent = "Blend created.";

          result.textContent = JSON.stringify(data, null, 2);

          if (data.audio_path) {
            player.src =
              "https://podblendz-backend.onrender.com" + data.audio_path;
            player.play();
          }
        } catch (err) {
          status.textContent = "Error creating blend.";
          result.textContent = String(err);
        }
      }
    </script>
  </body>
</html>
