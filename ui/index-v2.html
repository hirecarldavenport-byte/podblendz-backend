<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PodBlendz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* NAV */
    .nav {
      position: absolute;
      top: 0;
      width: 100%;
      z-index: 10;
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .nav-links a {
      margin-left: 1.8rem;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 92vh;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      overflow: hidden;
      background: #000;
    }

    .hero-left {
      position: relative;
      z-index: 3;
      padding: 9rem 3rem 4rem;
      max-width: 640px;
    }

    .hero-left h1 {
      font-size: clamp(2.7rem, 5vw, 3.7rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }

    .hero-left p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 2.3rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }

    .btn {
      padding: 0.85rem 1.9rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.4);
      background: transparent;
      color: #fff;
      cursor: pointer;
    }

    .btn-primary {
      background: #ff6a00;
      border: none;
      font-weight: 600;
    }

    .cta-note {
      font-size: 0.85rem;
      opacity: 0.7;
    }

    /* HERO IMAGE */
    .hero-right {
      position: relative;
      overflow: hidden;
    }

    .hero-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: right center;
    }

    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.92) 0%,
        rgba(0,0,0,0.70) 35%,
        rgba(0,0,0,0.35) 60%,
        rgba(0,0,0,0.00) 100%
      );
      z-index: 2;
    }

    /* TOPICS */
    .topics {
      padding: 3rem;
      background: #121212;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 1.4rem;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .nav {
        padding: 1rem 1.5rem;
      }

      .nav-links {
        display: none;
      }

      /* ✅ Mobile hero mirrors desktop intent */
      .hero {
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .hero-left {
        padding: 2.5rem 1.5rem 5.5rem;
        max-width: 100%;
      }

      .hero-left h1 {
        font-size: clamp(2rem, 7vw, 2.4rem);
        line-height: 1.1;
      }

      .hero-left p {
        font-size: 1rem;
        margin-bottom: 1.6rem;
      }

      .buttons {
        flex-direction: column;
        gap: 0.75rem;
      }

      .btn {
        width: 100%;
        text-align: center;
      }

      /* ✅ Image becomes part of hero, not a section */
      .hero-right {
        height: 55vh;
        margin-top: -3.5rem; /* pulls image upward into hero */
      }

      .hero-image {
        position: absolute;
      }

      .hero-gradient {
        background: linear-gradient(
          to bottom,
          rgba(0,0,0,0.95) 0%,
          rgba(0,0,0,0.55) 30%,
          rgba(0,0,0,0.15) 55%,
          rgba(0,0,0,0.0) 80%
        );
      }

      .topics {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <div class="logo">PodBlendz 🎧</div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-left">
      <h1>Your Podcasts.<br>Your Blendz. Your Way.</h1>
      <p>Listen Smarter. Share Deeper. Blend Ideas.</p>

      <div class="buttons">
        <button class="btn">Get Started</button>
        <button class="btn">Watch Demo</button>
        <button class="btn btn-primary" id="generateBlendzBtn">
          Generate Your Blendz
        </button>
      </div>

      <div class="cta-note">
        Start mixing your favorite podcast moments
      </div>
    </div>

    <div class="hero-right">
      <img
        class="hero-image"
        src="/assets/black-lady-on-the-train.jpg"
        alt="Podcast listener on transit"
      />
      <div class="hero-gradient"></div>
    </div>
  </section>

</body>
</html>
