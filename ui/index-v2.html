<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PodBlendz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* ---------- Reset ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
    }

    /* ---------- Hero Container ---------- */
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      background-color: #000;
      overflow: hidden;
    }

    /* Background image */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("https://podblendz-ui-346871934277-us-east-1.s3.amazonaws.com/assets/black-lady-on-the-train.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.95;
      z-index: 0;
    }

    /* Dark overlay to ensure text contrast */
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.85)
      );
      z-index: 1;
    }

    /* ---------- Hero Content ---------- */
    .hero-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Framed panel (from earlier design) */
    .hero-frame {
      border: 2px solid rgba(255, 255, 255, 0.6);
      padding: 3rem 3.5rem;
      max-width: 760px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(2px);
      background-color: rgba(0, 0, 0, 0.35);
    }

    .hero-frame h1 {
      font-size: clamp(2.2rem, 4.5vw, 3.4rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.1rem;
    }

    .hero-frame p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 2.3rem;
      line-height: 1.5;
    }

    /* ---------- CTA Button ---------- */
    .cta-button {
      display: inline-block;
      padding: 0.95rem 2.6rem;
      background-color: #ff6a00;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 999px;
      transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 0 rgba(0,0,0,0);
    }

    .cta-button:hover {
      background-color: #ff8126;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    }

    /* ---------- Responsive Tweaks ---------- */
    @media (max-width: 640px) {
      .hero-frame {
        padding: 2.2rem 1.8rem;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="hero-content">
      <div class="hero-frame">
        <h1>Your Podcasts. Your Blendz. Your Way.</h1>
        <p>
          PodBlendz transforms the most important podcast conversations into
          focused, intelligent blends you can actually finish — and remember.
        </p>
        <a href="#" class="cta-button">Generate Blendz</a>
      </div>
    </div>
  </section>
</body>
</html>
