<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PodBlendz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #111;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ---------- NAV ---------- */
    .nav {
      position: absolute;
      top: 0;
      width: 100%;
      z-index: 10;
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 0.5px;
    }

    .nav-links a {
      margin-left: 1.8rem;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .nav-links a:hover {
      opacity: 1;
    }

    /* ---------- HERO ---------- */
    .hero {
      position: relative;
      min-height: 95vh;
      background-image: url("https://podblendz-ui-346871934277-us-east-1.s3.amazonaws.com/assets/black-lady-on-the-train.jpg");
      background-size: cover;
      background-position: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.25)
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 8rem 3rem 4rem;
      max-width: 620px;
    }

    .hero-content h1 {
      font-size: clamp(2.6rem, 5vw, 3.6rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    .hero-content p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }

    /* ---------- BUTTONS ---------- */
    .button-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.8rem 1.6rem;
      border-radius: 999px;
      font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.4);
      background: transparent;
      cursor: pointer;
    }

    .btn-primary {
      background-color: #ff6a00;
      border: none;
      color: #fff;
      font-weight: 600;
    }

    .btn-primary:hover {
      background-color: #ff8126;
    }

    .cta-subtext {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      opacity: 0.75;
    }

    /* ---------- SECTIONS ---------- */
    .section {
      padding: 3rem;
      background-color: #121212;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .section h2 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
    }

    .placeholder-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.2rem;
    }

    .card {
      background-color: #1c1c1c;
      border-radius: 8px;
      padding: 1rem;
      height: 120px;
      opacity: 0.85;
    }

    .card:hover {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .hero-content {
        padding: 7rem 2rem 3rem;
      }

      .nav {
        padding: 1rem 2rem;
      }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <div class="logo">pod blendz</div>
    <div class="nav-links">
      <a href="#">Explore</a>
      <a href="#">My Blendz</a>
      <a href="#">Create</a>
      <a href="#">Sign Up</a>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Your Podcasts. Your Blendz. Your Way.</h1>
      <p>Listen Smarter. Share Deeper. Blend Ideas.</p>

      <div class="button-row">
        <button class="btn">Get Started</button>
