<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Generating Your Blendz | PodBlendz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 4rem 1.5rem 3rem;
      text-align: center;
    }

    h1 {
      font-size: 2.3rem;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      opacity: 0.85;
      max-width: 640px;
      margin: 0 auto 2.5rem;
      line-height: 1.5;
    }

    .summary {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .pill {
      background: #1c1c1c;
      border-radius: 999px;
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .loader {
      margin: 3rem auto 2rem;
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top-color: #ff6a00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-top: 0.75rem;
    }

    /* MOCK PLAYER */
    .player {
      margin-top: 4rem;
      background: #1b1b1b;
      border-radius: 14px;
      padding: 2rem 1.75rem;
      text-align: left;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
      display: none;
    }

    .player h2 {
      font-size: 1.3rem;
      margin-bottom: 0.4rem;
    }

    .player .meta {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 1.5rem;
    }

    .progress {
      height: 6px;
      background: #333;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }

    .progress-fill {
      width: 20%;
      height: 100%;
      background: #ff6a00;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .play {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #ff6a00;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
      border: none;
    }

    .time {
      font-size: 0.8rem;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Your Blendz is being created</h1>
    <p class="subtitle">
      We’re blending conversations across podcasts based on your preferences.
    </p>

    <div class="summary" id="summaryPills">
      <!-- Filled by JS -->
    </div>

    <div class="loader"></div>
    <div class="status">
      Identifying overlapping ideas and removing repetition…
    </div>

    <!-- MOCK PLAYER -->
    <div class="player" id="player">
      <h2>AI, Markets & Human Impact</h2>
      <div class="meta">
        10‑minute Blendz · Balanced perspectives
      </div>

      <div class="progress">
        <div class="progress-fill"></div>
      </div>

      <div class="controls">
        <button class="play">▶</button>
        <div class="time">0:00 / 10:00</div>
      </div>
    </div>
  </div>

  <script>
    const data = JSON.parse(
      localStorage.getItem("podblendz_onboard_complete") || "{}"
    );

    const summary = document.getElementById("summaryPills");

    if (data.topics) {
      data.topics.forEach(topic => {
        const pill = document.createElement("div");
        pill.className = "pill";
        pill.textContent = topic.replace("_", " ");
        summary.appendChild(pill);
      });
    }

    if (data.duration_minutes) {
      const pill = document.createElement("div");
      pill.className = "pill";
      pill.textContent = `${data.duration_minutes} min`;
      summary.appendChild(pill);
    }

    if (data.blend_style) {
      const pill = document.createElement("div");
      pill.className = "pill";
      pill.textContent =
        data.blend_style.charAt(0).toUpperCase() +
        data.blend_style.slice(1).replace("_", " ");
      summary.appendChild(pill);
    }

    // Simulate generation delay
    setTimeout(() => {
      document.querySelector(".loader").style.display = "none";
      document.querySelector(".status").textContent =
        "Your first Blendz is ready.";
      document.getElementById("player").style.display = "block";
    }, 2500);
  </script>
</body>
</html>
