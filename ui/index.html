<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PodBlendz</title>

  <style>
    :root {
      --bg: #070b10;
      --fg: #e8edf3;
      --muted: #9aa5b1;
      --brand: #53f6c8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .hero {
      position: relative;
      min-height: 88vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(7, 11, 16, 0.55),
          rgba(7, 11, 16, 0.9)
        ),
        url("/assets/copilot_image_1773703984768.jpeg")
        center / cover no-repeat;
      background-position: center top;
    }

    @media (min-width: 1024px) {
      .hero-bg {
        background-position: center 35%;
      }
      .hero {
        min-height: 90vh;
      }
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 900px;
      padding: 3.5rem 1.5rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.25rem, 5vw, 4rem);
      margin-bottom: 1rem;
      line-height: 1.1;
    }

    p {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 2.75rem;
    }

    .search {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    input {
      width: min(520px, 90vw);
      padding: 0.9rem 1rem;
      border-radius: 0.6rem;
      border: 1px solid #1f2933;
      background: #0d1117;
      color: var(--fg);
      font-size: 1rem;
    }

    input::placeholder {
      color: #667085;
    }

    button {
      padding: 0.9rem 1.35rem;
      border-radius: 0.6rem;
      border: none;
      background: var(--brand);
      color: #042018;
      font-weight: 600;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.97);
    }

    @media (max-width: 600px) {
      .search {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="hero-bg"></div>

    <div class="hero-content">
      <h1>Create audio stories in seconds</h1>
      <p>
        Search a topic. We fetch, blend, and preview a seamless audio narrative.
      </p>

      <div class="search">
        <input
          id="q"
          type="search"
          placeholder="Search topics (e.g. climate tech)"
        />
        <button id="go">Search</button>
      </div>
    </div>
  </section>

  <script>
    const q = document.getElementById("q");
    const go = document.getElementById("go");

    function run() {

    }

    go.onclick = run;
    q.onkeydown = (e) => {
      if (e.key === "Enter") run();
    };
  </script>

</body>
</html>
