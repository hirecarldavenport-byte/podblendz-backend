<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PodBlendz</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }

    p.subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.5rem;
      border: none;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .length-buttons button {
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 1rem;
      border: 1px solid #334155;
      background: transparent;
      color: #e5e7eb;
      cursor: pointer;
    }

    .length-buttons button.active {
      background: #f97316;
      color: #000;
      border: none;
      font-weight: 600;
    }

    .primary-btn {
      background: linear-gradient(180deg, #ff9a42, #f97316);
      border: none;
      padding: 0.75rem 1.75rem;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      color: #000;
      cursor: pointer;
      margin-top: 1rem;
    }

    .timeline {
      margin-top: 2rem;
      display: none;
    }

    .step {
  margin: 0.5rem 0;
  color: #cbd5e1;
  opacity: 0.3;
  transition: opacity 0.4s ease;
}

.step.active {
  opacity: 1;
}


    .error {
      margin-top: 1.5rem;
      color: #f87171;
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welcome.</h1>
    <p class="subtitle">What’s on your mind?</p>

    <input id="queryInput" type="text" placeholder="Morehouse College" />

    <div class="length-buttons">
      <button data-length="5">5 min</button>
      <button data-length="min" class="active">10 min</button>
      <button data-length="10">20 min</button>
      <button data-length="25">Deep dive</button>
    </div>

    <button id="generateBtn" class="primary-btn">
      Generate Your Blendz
    </button>

    <div class="timeline" id="timeline">
      <p>• Collecting moments</p>
      <p>• Shaping ideas</p>
      <p>• Blending voices</p>
    </div>

    <div class="timeline" id="timeline">
  <p class="step">• Collecting moments</p>
  <p class="step">• Shaping ideas</p>
  <p class="step">• Blending voices</p>
</div>

  <script>
    const queryInput = document.getElementById("queryInput");
    const buttons = document.querySelectorAll(".length-buttons button");
    const generateBtn = document.getElementById("generateBtn");
    const timeline = document.getElementById("timeline");
    const errorBox = document.getElementById("errorBox");

    let selectedLength = "min";

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedLength = btn.dataset.length;
      });
    });

    generateBtn.addEventListener("click", async () => {
      errorBox.style.display = "none";
      timeline.style.display = "block";

      const query = queryInput.value.trim();

      if (!query) {
        errorBox.textContent = "Please enter a topic.";
        errorBox.style.display = "block";
        timeline.style.display = "none";
        return;
      }

      try {
        const response = await fetch(
          "https://api.podblendz.com/blend/preview",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              query,
              length: selectedLength
            })
          }
        );

        if (!response.ok) {
          throw new Error("Backend error");
        }

        const data = await response.json();
        console.log("Blend preview:", data);

        // At this stage, preview works.
        // Audio and deeper steps can hook in later.

      } catch (err) {
        console.error(err);
        timeline.style.display = "none";
        errorBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
