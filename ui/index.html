<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pod Blendz</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
/* ================= RESET ================= */
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background-color: #0c0f16;
  color: #ffffff;
}

/* ================= NAV ================= */
header {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 50;
  background: rgba(15,17,22,0.65);
  backdrop-filter: blur(6px);
  padding: 0.75rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 700;
  font-size: 0.9rem;
  letter-spacing: 1px;
}

nav a {
  margin-left: 1.75rem;
  color: #dddddd;
  text-decoration: none;
  font-size: 0.85rem;
}

nav .signup {
  padding: 0.25rem 0.6rem;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.4);
}

/* ================= HERO ================= */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: center;
  background-color: #0c0f16;
  overflow: hidden;
}

/* Right-side image ONLY */
.hero::after {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 58%;
  height: 100%;
  background-image: url("/assets/Screenshot_20260331_211315_Gallery.jpg");
  background-size: cover;
  background-position: center right;
  z-index: 1;
}

/* Cinematic gradient overlay */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(10,12,18,0.97) 0%,
    rgba(10,12,18,0.9) 35%,
    rgba(10,12,18,0.35) 55%,
    rgba(10,12,18,0.0) 70%
  );
  z-index: 2;
}

/* Left content */
.hero-content {
  position: relative;
  z-index: 3;
  padding-left: 2.5rem;
  max-width: 640px;
}

/* Typography exactly layered */
.hero h1 {
  font-size: 2.9rem;
  line-height: 1.15;
  margin-bottom: 0.5rem;
  font-weight: 700;
}

.hero h1 span {
  display: block;
}

.hero h2 {
  font-size: 1.05rem;
  font-weight: 400;
  color: #cfcfcf;
  margin-bottom: 1.8rem;
}

/* Buttons */
.hero-actions {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.btn {
  padding: 0.55rem 1.3rem;
  font-size: 0.85rem;
  border-radius: 999px;
  cursor: pointer;
  border: none;
}

.btn-outline {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.45);
  color: #ffffff;
}

.btn-primary {
  background: linear-gradient(180deg,#ff9a42,#f97316);
  color: #ffffff;
  padding: 0.85rem 1.95rem;
  font-size: 0.9rem;
  font-weight: 600;
  border-radius: 999px;
  box-shadow:
    0 8px 24px rgba(0,0,0,0.85),
    inset 0 1px 2px rgba(255,255,255,0.35);
}

.hero small {
  display: block;
  margin-top: 0.4rem;
  font-size: 0.75rem;
  color: #aaa;
}

/* ================= CATEGORIES ================= */
.categories {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 1rem;
  padding: 2rem;
  background: linear-gradient(#101421,#0c0f16);
}

.category {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: #1a1e2c;
  border-radius: 8px;
  padding: 1rem;
  cursor: pointer;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}

/* ================= LATEST BLENDZ ================= */
.latest {
  padding: 2rem;
}

.latest h3 {
  margin-bottom: 1rem;
  font-size: 1.2rem;
}

.blend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap: 1.2rem;
}

.blend-card {
  background: #1a1e2c;
  border-radius: 8px;
  overflow: hidden;
}

.blend-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.blend-card div {
  padding: 0.75rem;
}

.blend-card h4 {
  margin: 0 0 0.2rem;
  font-size: 0.9rem;
}

.blend-card span {
  font-size: 0.75rem;
  color: #aaa;
}
</style>
</head>

<body>

<header>
  <div class="logo">pod blendz</div>
  <nav>
    Explore
    My Blendz
    Create
    <span class="signup">Sign Up</span>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>
      Your Podcasts.
      <span>Your Blendz.</span>
      <span>Your Way.</span>
    </h1>

    <h2>Listen Smarter. Share Deeper. Blend Ideas.</h2>

    <div class="hero-actions">
      <button class="btn btn-outline">Get Started</button>
      <button class="btn btn-outline">Watch Demo</button>
    </div>

    <button class="btn-primary" onclick="goSearch('trending')">
      Generate Your Blendz
    </button>

    <small>Start mixing your favorite podcast moments</small>
  </div>
</section>

<script>
function goSearch(q) {
  window.location.href =
    "/search-results.html?q=" + encodeURIComponent(q);
}
</script>

</body>
</html>
