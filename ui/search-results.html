<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PodBlendz – Results</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #0b1220, #020617);
      color: #e5e7eb;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }

    .meta {
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .result-box {
      background: rgba(255,255,255,0.04);
      border-radius: 0.75rem;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .error {
      color: #f87171;
      margin-top: 1rem;
    }

    .back-btn {
      display: inline-block;
      margin-top: 2rem;
      background: linear-gradient(180deg, #ff9a42, #f97316);
      border: none;
      padding: 0.75rem 1.75rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #000;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Blendz Preview</h1>
    <div class="meta" id="meta"></div>

    <div id="results"></div>

    <div class="error" id="error"></div>

    <a href="/" class="back-btn">Create another Blendz</a>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
      const query = params.get("q");
      const length = params.get("len") || "min";

      const meta = document.getElementById("meta");
      const results = document.getElementById("results");
      const errorBox = document.getElementById("error");

      if (!query) {
        errorBox.textContent = "Missing query.";
        return;
      }

      meta.textContent = `Topic: "${query}" • Duration: ${length}`;

      try {
        const response = await fetch(
          "https://api.podblendz.com/blend/preview",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              query,
              length
            })
          }
        );

        if (!response.ok) {
          throw new Error("Backend error");
        }

        const data = await response.json();

        const box = document.createElement("div");
        box.className = "result-box";
        box.textContent = `Preview ready (ID: ${data.blend_id})`;

        results.appendChild(box);

      } catch (err) {
        console.error(err);
        errorBox.textContent = "There was a problem generating this Blendz.";
      }
    });
  </script>
</body>
</html>
