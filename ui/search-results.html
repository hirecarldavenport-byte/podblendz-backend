<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search Results</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f7f8fa;
      margin: 0;
      padding: 2rem;
    }
    h1 {
      margin-bottom: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>

<h1>Search Results</h1>
<p id="subtitle"></p>

<div class="grid" id="results"></div>

<script>
  const q = new URLSearchParams(location.search).get("q");
  document.getElementById("subtitle").textContent =
    q ? `Results for “${q}”` : "No query provided.";

  if (q) {
    fetch(`/rss/search?q=${encodeURIComponent(q)}`)
      .then(r => r.json())
      .then(d => {
        const el = document.getElementById("results");
        (d.results || []).forEach(r => {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `<strong>${r.title}</strong><br/><small>${r.source}</small>`;
          el.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById("results").textContent = "Error loading results.";
      });
  }
</script>

</body>
</html>
