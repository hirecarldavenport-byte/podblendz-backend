<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Podcast Episodes</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f7f8fa;
      color: #111;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 1.5rem 2rem;
    }

    header h1 {
      margin: 0;
      font-size: 1.6rem;
    }

    header p {
      margin: 0.25rem 0 0;
      color: #555;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .controls button {
      background: #111827;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .controls button:hover {
      background: #2563eb;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
    }

    .episodes {
      background: white;
      border-radius: 14px;
      padding: 1.25rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .episode {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid #eee;
    }

    .episode:last-child {
      border-bottom: none;
    }

    .episode h4 {
      margin: 0;
      font-size: 0.95rem;
    }

    .episode small {
      color: #666;
    }

    .tray {
      background: white;
      border-radius: 14px;
      padding: 1.25rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      position: sticky;
      top: 2rem;
      height: fit-content;
    }

    .tray h3 {
      margin-top: 0;
    }

    .tray ul {
      padding-left: 1rem;
      margin: 0.5rem 0;
    }

    .tray button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.7rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .loading,
    .error {
      padding: 1rem;
      color: #555;
    }
  </style>
</head>

<body>

<header>
  <h1 id="podcast-title">Podcast</h1>
  <p id="podcast-desc">Select episodes to create your audio blend</p>

  <!-- ✅ Quick‑select buttons -->
  <div class="controls">
    <button onclick="selectTop(3)">Top 3 episodes</button>
    <button onclick="selectLatest(5)">Latest 5</button>
    <button onclick="selectPopular()">Most popular</button>
  </div>
</header>

<main>

  <!-- Episodes list -->
  <section class="episodes" id="episode-list">
    <div class="loading">Loading episodes…</div>
  </section>

  <!-- Selection tray -->
  <aside class="tray">
    <h3>Selected Episodes</h3>
    <ul id="selection-list"></ul>
    <p id="selection-count">0 selected</p>
    <button onclick="proceed()">Create Blend</button>
  </aside>

</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const feed = params.get("feed");

  const episodeList = document.getElementById("episode-list");
  const selectionList = document.getElementById("selection-list");
  const selectionCount = document.getElementById("selection-count");

  const selected = new Set();
  let episodes = [];

  if (!feed) {
    episodeList.innerHTML =
      "<div class='error'>No podcast selected.</div>";
  } else {
    loadEpisodes(feed);
  }
console.log("UPDATED podcast.html loaded");
  async function loadEpisodes(feedUrl) {
    try {
      const res = await fetch(
        `/rss/search?q=${encodeURIComponent(feedUrl)}`
      );
      const data = await res.json();

      episodes = data.episodes || [];
      renderEpisodes();
    } catch (err) {
      console.error(err);
      episodeList.innerHTML =
        "<div class='error'>Error loading episodes.</div>";
    }
  }

  function renderEpisodes() {
    if (!episodes.length) {
      episodeList.innerHTML =
        "<div class='error'>No episodes found.</div>";
      return;
    }

    episodeList.innerHTML = episodes.map(ep => `
      <div class="episode">
        <input type="checkbox"
          ${selected.has(ep.id) ? "checked" : ""}
          onchange="toggleSelection('${ep.id}')"
        />
        <div>
          <h4>${ep.title}</h4>
          <small>
            ${ep.published || ""}${ep.duration ? " · " + ep.duration : ""}
          </small>
        </div>
      </div>
    `).join("");
  }

  function renderTray() {
    selectionList.innerHTML = [...selected].map(id => {
      const ep = episodes.find(e => e.id === id);
      return `<li>${ep.title}</li>`;
    }).join("");

    selectionCount.textContent = `${selected.size} selected`;
  }

  function toggleSelection(id) {
    if (selected.has(id)) {
      selected.delete(id);
    } else {
      selected.add(id);
    }

    renderEpisodes();
    renderTray();
  }

  // ✅ Quick‑select logic

  function selectTop(n) {
    selected.clear();
    episodes.slice(0, n).forEach(e => selected.add(e.id));
    renderEpisodes();
    renderTray();
  }

  function selectLatest(n) {
    selected.clear();
    episodes
      .slice()
      .sort((a, b) =>
        new Date(b.published) - new Date(a.published)
      )
      .slice(0, n)
      .forEach(e => selected.add(e.id));

    renderEpisodes();
    renderTray();
  }

  function selectPopular() {
    selected.clear();
    episodes
      .slice()
      .sort((a, b) =>
        (b.popularity || 0) - (a.popularity || 0)
      )
      .slice(0, 5)
      .forEach(e => selected.add(e.id));

    renderEpisodes();
    renderTray();
  }

  function proceed() {
    // Next step placeholder
    alert("Next: blend configuration");
  }
</script>

</body>
</html>
