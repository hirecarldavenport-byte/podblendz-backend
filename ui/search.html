<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PodBlendz – Search</title>

  <style>
    :root {
      --bg: #070b10;
      --panel: #0d1117;
      --fg: #e8edf3;
      --muted: #9aa5b1;
      --brand: #53f6c8;
      --card: #ffffff;
      --card-text: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg, #0b1220, #070b10);
      color: var(--fg);
    }

    header {
      padding: 1.5rem;
      background: radial-gradient(circle at top left, #18223a, #0b1220);
      border-bottom: 1px solid #1f2933;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    header p {
      margin: 0.25rem 0 0;
      color: var(--muted);
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    .status {
      margin-bottom: 1.5rem;
      color: var(--muted);
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--card);
      color: var(--card-text);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .card h3 {
      margin: 0 0 0.5rem;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .card small {
      color: #444;
    }

    .card button {
      margin-top: 0.75rem;
      padding: 0.5rem 0.8rem;
      border: none;
      border-radius: 6px;
      background: var(--brand);
      color: #042018;
      font-weight: 600;
      cursor: pointer;
    }

    .card button:active {
      transform: scale(0.97);
    }

    .empty {
      color: var(--muted);
      margin-top: 2rem;
    }
  </style>
</head>

<body>

<header>
  <h1>Search Results</h1>
  <p id="subtitle">Loading…</p>
</header>

<main>
  <div id="status" class="status"></div>
  <div id="results" class="results"></div>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const query = params.get("q");

  const statusEl = document.getElementById("status");
  const resultsEl = document.getElementById("results");
  const subtitleEl = document.getElementById("subtitle");

  if (!query) {
    subtitleEl.textContent = "No search query provided.";
    statusEl.textContent = "Please return to the homepage and enter a topic.";
  } else {
    subtitleEl.textContent = `Results for “${query}”`;
    runSearch(query);
  }

  async function runSearch(q) {
    statusEl.textContent = "Searching…";

    try {
      const res = await fetch(`/rss/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();

      renderResults(data.results || []);
    } catch (err) {
      statusEl.textContent = "Error loading results.";
      console.error(err);
    }
  }

  function renderResults(results) {
    resultsEl.innerHTML = "";

    if (!results.length) {
      statusEl.textContent = "No results found.";
      resultsEl.innerHTML = `<div class="empty">Try a different topic.</div>`;
      return;
    }

    statusEl.textContent = `Found ${results.length} result${results.length > 1 ? "s" : ""}.`;

    resultsEl.innerHTML = results.map(item => `
      <div class="card">
        <h3>${item.title}</h3>
        <small>Source: ${item.source || "Unknown"}</small>
        <br/>
        <button data-title="${item.title}">
          Select for narration
        </button>
      </div>
    `).join("");
  }
</script>

</body>
</html>
