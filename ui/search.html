<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>PodBlendz</title>

  <style>
    :root {
      --bg: #080d12;
      --fg: #e7ecf4;
      --muted: #9aa5b1;
      --brand: #60e7b7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    /* ===== HERO SECTION ===== */
    .hero {
      position: relative;
      min-height: 68vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Hero background image */
    .hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(10%) saturate(110%) blur(4px);
    }

    /* Gradient overlay */
    .layer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(7, 9, 13, 0.55),
        rgba(7, 9, 13, 0.85)
      );
    }

    /* Hero content */
    .content {
      position: relative;
      max-width: 980px;
      padding: 48px 20px;
      text-align: center;
      z-index: 2;
    }

    h1 {
      font-size: clamp(28px, 6vw, 56px);
      margin: 0 0 12px;
      font-weight: 700;
    }

    .sub {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: clamp(14px, 2.2vw, 18px);
    }

    /* Search CTA */
    .search {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    input[type="search"] {
      width: min(680px, 90vw);
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #222;
      background: #0f1218;
      color: var(--fg);
      font-size: 16px;
    }

    input::placeholder {
      color: #6b7280;
    }

    button {
      padding: 14px 18px;
      border-radius: 10px;
      border: 0;
      background: var(--brand);
      color: #08110d;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.05);
    }

    button:focus {
      outline: 2px solid var(--brand);
      outline-offset: 2px;
    }

    /* ===== MOBILE POLISH ===== */
    @media (max-width: 640px) {
      .hero {
        min-height: 72vh;
      }

      h1 {
        font-size: clamp(24px, 7vw, 40px);
      }

      .sub {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <!-- IMPORTANT: Image served from UI S3 bucket via CloudFront -->
    <img src="/assets/copilot_image_1773703984768.jpeg" alt="" aria-hidden="true">

    <div class="layer"></div>

    <div class="content">
      <h1>Create audio stories in seconds</h1>
      <p class="sub">
        Type a topic. We'll fetch, blend, and preview a narrative.
      </p>

      <div class="search">
        <input
          id="q"
          type="search"
          placeholder="Search topics (e.g., climate tech)"
          aria-label="Search topics"
        >
        <button id="go">Search</button>
      </div>
    </div>
  </section>

  <!-- Simple navigation to your second page -->
  <script>
    const go = document.getElementById('go');
    const q  = document.getElementById('q');

    function runSearch() {
      const query = q.value.trim();
      if (!query) return;
      window.location.href = `/search.html?q=${encodeURIComponent(query)}`;
    }

    go.addEventListener('click', runSearch);
    q.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') runSearch();
    });
  </script>

</body>
</html>
