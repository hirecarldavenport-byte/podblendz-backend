<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PodBlendz – Search</title>

  <style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: linear-gradient(180deg, #0b1220, #070b10);
    color: #e8edf3;
  }

  header {
    padding: 1.5rem;
    background: radial-gradient(circle at top left, #18223a, #0b1220);
    border-bottom: 1px solid #1f2933;
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.25rem;
  }

  .status {
    margin-bottom: 1rem;
    color: #9aa5b1;
  }

  .results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  .card {
    background: #ffffff;
    color: #111;
    border-radius: 10px;
    padding: 1rem;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
  }

  .card h3 {
    margin: 0 0 0.5rem;
    font-size: 1.05rem;
  }

  .card small {
    color: #444;
  }

  .card button {
    margin-top: 0.75rem;
    padding: 0.5rem 0.8rem;
    border: none;
    border-radius: 6px;
    background: #53f6c8;
    color: #042018;
    font-weight: 600;
    cursor: pointer;
  }
</style>
