<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Pod Blendz</title>
<style>
  :root{--bg:#0f172a;--panel:#0b1220;--muted:#94a3b8;--text:#e5e7eb;--line:rgba(255,255,255,.08);--brand1:#8b5cf6;--brand2:#06b6d4;--ok:#22c55e;--err:#ef4444;}
  *{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  header{padding:28px 16px;background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(6,182,212,.2));border-bottom:1px solid var(--line)}
  .wrap{max-width:1100px;margin:0 auto;padding:16px}
  h1{margin:0 0 6px}.tag{color:var(--muted)}
  section.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin:16px 0}
  .grid{display:grid;gap:12px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}
  .row{display:grid;grid-template-columns:160px 1fr;gap:10px;align-items:center}
  label{color:var(--muted)}
  input[type="text"],input[type="number"],select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text)}
  input[type="file"]{color:var(--text)}
  .btn{background:linear-gradient(135deg,var(--brand1),var(--brand2));border:none;color:#fff;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .muted{color:var(--muted)} .ok{color:var(--ok)} .err{color:var(--err)}
  audio{width:100%;margin-top:8px}
  .list{display:grid;gap:10px}
  .result,.episode{display:grid;gap:10px;grid-template-columns:28px 1fr auto;border:1px solid var(--line);border-radius:12px;padding:10px;background:rgba(255,255,255,.02)}
  .title{font-weight:600}.small{font-size:12px;color:var(--muted)}
  .right{justify-self:end}.pill{display:inline-block;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--muted);font-size:12px;margin-left:8px}
  .flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .divider{height:1px;background:var(--line);margin:12px 0}
  @media(max-width:980px){.g2,.g3{grid-template-columns:1fr}.row{grid-template-columns:1fr}.result,.episode{grid-template-columns:28px 1fr}}
  .link{color:#93c5fd;text-decoration:none}
  .caps{letter-spacing:.04em;text-transform:uppercase;font-size:12px;color:var(--muted)}
  .badge{background:rgba(255,255,255,.06);border:1px solid var(--line);padding:2px 6px;border-radius:999px;font-size:12px;color:#cbd5e1}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Pod Blendz <span class="pill">LIVE</span></h1>
    <p class="tag">One continuous flow: search a show → select episodes → choose length → optional bed → <strong>Blendz</strong>.</p>
  </div>
</header>

<main class="wrap">

  <!-- 1) SEARCH -->
  <section class="panel">
    <div class="caps">Search Show</div>
    <div class="grid g3" style="margin-top:8px">
      <div class="row"><span>Query</span><input id="q" type="text" placeholder="history, health, 'as a man thinketh'"/></div>
      <div class="row">
        <span>Provider</span>
        <select id="provider"><option value="itunes" selected>iTunes (no key)</option><option value="podcastindex">Podcast Index</option></select>
      </div>
      <div class="row"><span>Limit</span><input id="limit" type="number" value="20" min="1" max="50"/></div>
    </div>
    <div class="flex" style="margin-top:8px">
      <button id="btnSearch" class="btn">Search</button>
      <span id="sStatus" class="muted"></span>
    </div>
    <div class="list" id="results" style="margin-top:10px"></div>
  </section>

  <!-- 2) FEED & EPISODES (with selection) -->
  <section class="panel">
    <div class="caps">Feed & Episodes</div>
    <div class="row" style="margin-top:8px"><span>Feed URL</span><input id="feedUrl" type="text" placeholder="https://example.com/feed.xml"/></div>
    <div class="flex" style="margin-top:8px">
      <button id="btnOpenFeed" class="btn">Open Feed</button>
      <span id="fStatus" class="muted"></span>
    </div>
    <div id="channel" class="small" style="margin-top:10px"></div>

    <div class="divider"></div>

    <div class="grid g3">
      <div class="row"><span>Program length</span>
        <select id="progLen">
          <option value="5">5 minutes</option>
          <option value="10" selected>10 minutes</option>
          <option value="20">20 minutes</option>
        </select>
      </div>
      <div class="row"><span>Crossfade (ms)</span><input id="xf" type="number" value="800" min="0" max="8000"/></div>
      <div class="row"><span>Normalize</span>
        <select id="normalize"><option value="true" selected>Yes</option><option value="false">No</option></select>
      </div>
    </div>

    <div class="row" style="margin-top:8px"><span>Music bed (URL)</span><input id="bedUrl" type="text" placeholder="https://example.com/bed.mp3 (optional)"/></div>

    <div class="flex" style="margin-top:8px">
      <button id="btnBlendzEpisodes" class="btn">Blendz Selected Episodes</button>
      <span id="bStatus" class="muted"></span>
      <span id="selectionInfo" class="badge">0 selected</span>
    </div>

    <div class="list" id="episodes" style="margin-top:10px"></div>

    <audio id="blendzPlayer" controls style="margin-top:8px"></audio>
    <div id="blendzDownload" class="small" style="margin-top:6px"></div>
  </section>

  <!-- (Optional) Upload Mixer + Tone (collapsed UI) -->
  <section class="panel">
    <div class="caps">Tools</div>
    <details>
      <summary class="small">Upload Mixer (voice + music)</summary>
      <div class="grid g2" style="margin-top:8px">
        <div><label class="small">Voice</label><input id="fileVoice" type="file" accept="audio/*"/></div>
        <div><label class="small">Music</label><input id="fileMusic" type="file" accept="audio/*"/></div>
      </div>
      <div class="flex" style="margin-top:8px">
        <button id="btnUploadBlend" class="btn">Blend (Uploads)</button>
        <span id="uStatus" class="muted"></span>
      </div>
      <audio id="uPlayer" controls></audio>
    </details>

    <details style="margin-top:10px">
      <summary class="small">Tone Test</summary>
      <div class="flex" style="margin-top:8px">
        <label class="small">Freq <input id="freq" type="number" value="440" style="width:120px"></label>
        <label class="small">Dur (ms) <input id="dur" type="number" value="1500" style="width:160px"></label>
        <button id="btnTone" class="btn">Generate Tone</button>
        <span id="tStatus" class="muted"></span>
      </div>
      <audio id="tonePlayer" controls></audio>
    </details>
  </section>

</main>

<script>
  const $ = id => document.getElementById(id);
  const base = location.origin;
  const h = html => {const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstElementChild;};
  let selectedFeed = null;
  let selectedEpisodes = []; // array of {title, url, published}

  // -------- SEARCH
  $('btnSearch').addEventListener('click', async () => {
    const q = $('q').value.trim();
    const provider = $('provider').value;
    const limit = $('limit').value || 20;
    if(!q){ $('sStatus').textContent = 'Enter a search term.'; return; }
    $('sStatus').textContent = 'Searching…';
    $('results').innerHTML = '';
    try{
      const u = new URL(`${base}/rss/search`);
      u.searchParams.set('q', q); u.searchParams.set('source', provider); u.searchParams.set('limit', limit);
      const r = await fetch(u); if(!r.ok) throw new Error('HTTP '+r.status);
      const j = await r.json();
      $('sStatus').textContent = `Found ${j.results?.length ?? 0} shows (${j.provider}).`;
      renderResults(j.results || []);
    }catch(e){ $('sStatus').textContent = 'Failed: '+e.message; }
  });

  function renderResults(list){
    const box = $('results'); box.innerHTML = '';
    list.forEach(item => {
      const el = h(`
        <div class="result">
          <input type="checkbox" disabled style="opacity:.3"/>
          <div>
            <div class="title">${item.title || '(no title)'}</div>
            <div class="small">${item.author || ''}</div>
            <div class="small muted">${item.feed_url ? 'Feed ready' : 'Needs lookup'} · Provider: ${item.source}</div>
          </div>
          <div class="right"><button class="btn">Open</button></div>
        </div>
      `);
      el.querySelector('button').addEventListener('click', async () => {
        try{
          $('fStatus').textContent = 'Resolving feed…';
          let feedUrl = item.feed_url;
          if(!feedUrl && item.itunes_collection_id){
            const u = new URL(`${base}/rss/lookup`);
            u.searchParams.set('collection_id', item.itunes_collection_id);
            const r = await fetch(u); if(!r.ok) throw new Error('Lookup failed '+r.status);
            const j = await r.json(); feedUrl = j.feed_url || j.feedUrl;
          }
          if(!feedUrl){ $('fStatus').textContent = 'No feed URL for this show.'; return; }
          $('feedUrl').value = feedUrl;
          await openFeed();
          window.scrollTo({top: $('feedUrl').getBoundingClientRect().top + window.scrollY - 80, behavior:'smooth'});
        }catch(e){ $('fStatus').textContent = 'Open failed: '+e.message; }
      });
      box.appendChild(el);
    });
  }

  // -------- FEED
  $('btnOpenFeed').addEventListener('click', openFeed);
  async function openFeed(){
    const feedUrl = $('feedUrl').value.trim();
    if(!feedUrl){ $('fStatus').textContent = 'Enter a feed URL.'; return; }
    $('fStatus').textContent = 'Loading feed…';
    try{
      const u = new URL(`${base}/rss/parse`); u.searchParams.set('feed_url', feedUrl);
      const r = await fetch(u); if(!r.ok) throw new Error('HTTP '+r.status);
      const j = await r.json();
      selectedFeed = { url: feedUrl, channel: j.channel };
      $('channel').innerHTML = `<strong>${j.channel?.title ?? ''}</strong> &nbsp;<span class="muted">${j.items?.length ?? 0} episodes</span>`;
      renderEpisodes(j.items || []);
      $('fStatus').textContent = '';
    }catch(e){ $('fStatus').textContent = 'Failed: '+e.message; }
  }

  function renderEpisodes(items){
    selectedEpisodes = [];
    $('selectionInfo').textContent = `0 selected`;
    const box = $('episodes'); box.innerHTML = '';
    items.forEach((ep, idx) => {
      const epUrl = ep.enclosure?.url || '';
      const el = h(`
        <div class="episode">
          <input type="checkbox" ${epUrl ? '' : 'disabled'} data-url="${epUrl}" data-title="${(ep.title||'').replace(/"/g,'&quot;')}"/>
          <div>
            <div class="title">${ep.title || '(no title)'}</div>
            <div class="small muted">${ep.published || ''}</div>
            ${epUrl ? `<audio controls src="${epUrl}" preload="none"></audio>` : `<div class="small err">No playable enclosure</div>`}
          </div>
          <div class="right small muted">${epUrl ? 'Episode' : 'Unplayable'}</div>
        </div>
      `);
      const cb = el.querySelector('input[type="checkbox"]');
      cb.addEventListener('change', () => {
        if(cb.checked){
          selectedEpisodes.push({title: cb.dataset.title, url: cb.dataset.url});
        }else{
          selectedEpisodes = selectedEpisodes.filter(x => x.url !== cb.dataset.url);
        }
        $('selectionInfo').textContent = `${selectedEpisodes.length} selected`;
      });
      box.appendChild(el);
    });
  }

  // -------- BLENDZ SELECTED EPISODES
  $('btnBlendzEpisodes').addEventListener('click', async () => {
    if(selectedEpisodes.length === 0){ $('bStatus').textContent = 'Select at least one episode.'; return; }
    const episode_urls = selectedEpisodes.map(x => x.url);
    const target_minutes = parseInt($('progLen').value, 10) || 10;
    const crossfade_ms = parseInt($('xf').value || '800', 10);
    const normalize = $('normalize').value === 'true';
    const music_url = $('bedUrl').value.trim() || null;

    $('bStatus').textContent = 'Blending… (download, trim, crossfade, duck, encode)';
    try{
      const res = await fetch(`${base}/rss/mix-episodes-over-music`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          episode_urls, target_minutes, crossfade_ms, normalize,
          music_url, music_gain_db: -3.0,
          duck_enable: true, duck_db: 12, duck_attack_ms: 120, duck_release_ms: 250, duck_min_speech_ms: 160,
          bitrate: "192k", sample_rate: 44100, stereo: true,
          out_name: `blendz_${Date.now()}.mp3`
        })
      });
      if(!res.ok) throw new Error('HTTP '+res.status);
      const blob = await res.blob();
      const obj = URL.createObjectURL(blob);
      $('blendzPlayer').src = obj;
      const cd = res.headers.get('Content-Disposition') || '';
      const m = cd.match(/filename="([^"]+)"/);
      const name = m ? m[1] : `blendz_${Date.now()}.mp3`;
      $('blendzDownload').innerHTML = `${obj}Download ${name}</a>`;
      $('bStatus').textContent = 'Success';
    }catch(e){ $('bStatus').textContent = 'Failed: '+e.message; }
  });

  // -------- Upload & Tone sanity (simple)
  $('btnUploadBlend').addEventListener('click', async () => {
    const v = $('fileVoice').files?.[0], m = $('fileMusic').files?.[0];
    if(!v || !m){ $('uStatus').textContent = 'Pick voice & music.'; return; }
    $('uStatus').textContent = 'Blending…';
    const fd = new FormData(); fd.append('voice', v); fd.append('music', m);
    const r = await fetch(`${base}/blend/mix-two?duck_enable=true&duck_db=12&duck_attack_ms=120&duck_release_ms=250&bitrate=192k&sample_rate=44100&stereo=true`, {method:'POST', body: fd});
    if(!r.ok){ $('uStatus').textContent = 'Failed: HTTP '+r.status; return; }
    const b = await r.blob(); $('uPlayer').src = URL.createObjectURL(b); $('uStatus').textContent = 'Success';
  });

  $('btnTone').addEventListener('click', async () => {
    const f = $('freq').value || 440, d = $('dur').value || 1500;
    $('tStatus').textContent = 'Requesting tone…';
    const r = await fetch(`${base}/blend/tone?freq=${encodeURIComponent(f)}&duration_ms=${encodeURIComponent(d)}&bitrate=192k`, {method:'POST'});
    if(!r.ok){ $('tStatus').textContent = 'Failed: HTTP '+r.status; return; }
    const b = await r.blob(); $('tonePlayer').src = URL.createObjectURL(b); $('tStatus').textContent = 'Success';
  });
</script>
</body>
</html>
