## ✅ ✅ FINAL, CORRECT WORKFLOW FILE

**File:** `.github/workflows/build-transcription-worker.yml`

```yaml
name: Build Transcription Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/transcription/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push transcription worker image
        uses: docker/build-push-action@v5
        with:
          context: ./workers/transcription
          file: ./workers/transcription/Dockerfile
          push: true
          tags: hirecarldavenport/transcription-worker:latest